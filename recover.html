<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Quest — Recover your dashboard link</title>
<link rel="icon" href="eq_icon.png">
<style>
  :root{--gold:#7fae4d;--gold-bright:#b4e07a;--gold-dark:#46662a;--parchment:#eef0e2;--parchment-dark:#9fae84;--stone-dark:#1d2415;--stone-light:#4a553a;--good:#7ec46b;--danger:#e0a0a0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(ellipse at 50% -10%,#37452a 0%,var(--stone-dark) 55%,#11160c 100%);
    color:var(--parchment);font-family:'Crimson Pro',Georgia,serif;text-align:center}
  .box{width:100%;max-width:420px;background:linear-gradient(180deg,rgba(44,51,32,0.92),rgba(29,36,21,0.92));
    border:1px solid var(--gold-dark);border-radius:10px;padding:30px 28px;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
  .ic{font-size:38px}
  h1{font-family:'Cinzel',Georgia,serif;font-weight:700;font-size:21px;letter-spacing:1px;color:var(--gold-bright);margin:8px 0}
  p{color:var(--parchment-dark);font-size:15px;line-height:1.6}
  label{display:block;font-family:'Cinzel',Georgia,serif;font-size:12px;letter-spacing:2px;color:var(--gold);margin:18px 0 8px;text-align:left}
  input{width:100%;font-size:16px;padding:12px;border-radius:6px;border:1px solid var(--gold-dark);background:rgba(0,0,0,0.45);color:var(--gold-bright)}
  input:focus{outline:none;border-color:var(--gold-bright)}
  button{width:100%;font-family:'Cinzel',Georgia,serif;font-size:15px;letter-spacing:1px;margin-top:16px;padding:13px;border-radius:7px;cursor:pointer;border:1px solid var(--gold-dark);background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#14200a;font-weight:700}
  .msg{margin-top:16px;padding:12px 14px;border-radius:7px;font-size:15px;background:rgba(99,153,34,0.16);color:var(--good)}
  .hide{display:none}
</style>
</head>
<body>
<div class="box">
  <div id="form">
    <div class="ic">&#128231;</div>
    <h1>Find my dashboard link</h1>
    <p>Lost your link? Enter the email you bought Earth Quest with and we'll send it again.</p>
    <label for="email">Your email</label>
    <input id="email" type="email" placeholder="you@school.org" onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()" id="btn">Email me my link</button>
  </div>
  <div id="done" class="hide">
    <div class="ic">&#9989;</div>
    <h1>Check your inbox</h1>
    <p>If that email has an Earth Quest purchase, your dashboard link is on its way. (Give it a minute, and check spam just in case.)</p>
  </div>
</div>
<script>
async function send(){
  var email = (document.getElementById('email').value || '').trim();
  if(!email){ document.getElementById('email').focus(); return; }
  var btn = document.getElementById('btn'); btn.disabled = true; btn.textContent = 'Sending…';
  try{ await fetch('/api/recover', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email:email }) }); }catch(e){}
  document.getElementById('form').classList.add('hide');
  document.getElementById('done').classList.remove('hide');
}
</script>
</body>
</html>
